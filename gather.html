<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gather x soho house – jessi clover belgrave</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eabcbc;
      color: #2d6b5b;
      font-family: 'VT323', monospace;
      text-transform: lowercase;
      cursor: url('assets/cursor.png') 24 8, pointer;
      min-height: 100vh;
    }
    a { color: #2d6b5b; text-decoration: none; }
    a:hover { opacity: 0.6; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.8rem 2rem 0;
    }
    .logo-wrap img { height: 70px; display: block; }
    nav { display: flex; gap: 2.5rem; font-size: 1.5rem; }

    .page-inner {
      padding: 2rem 2rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: normal;
      margin-bottom: 2rem;
      opacity: 0.75;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
    }
    /* centre last item if alone in row */
    .photo-grid img:last-child:nth-child(3n+1) { grid-column: 2; }

    .photo-grid img {
      width: 100%; height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s ease;
      cursor: url('assets/cursor.png') 24 8, pointer;
    }
    .photo-grid img:hover { transform: scale(1.02); opacity: 0.85; }

    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(234,188,188,0.95); z-index: 2000;
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 88vw; max-height: 88vh; object-fit: contain; display: block; }
    #lb-close { position: fixed; top: 28px; right: 36px; font-size: 1.4rem; color: #2d6b5b; opacity: 0.7; cursor: url('assets/cursor.png') 24 8, pointer; }
    #lb-close:hover { opacity: 1; }
    #lb-prev, #lb-next { position: fixed; top: 50%; transform: translateY(-50%); font-size: 1.4rem; color: #2d6b5b; opacity: 0.5; cursor: url('assets/cursor.png') 24 8, pointer; user-select: none; }
    #lb-prev { left: 36px; } #lb-next { right: 36px; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }

    footer { text-align: center; padding: 2rem; font-size: 0.9rem; opacity: 0.5; }

    @media (max-width: 768px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .photo-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="lightbox">
    <span id="lb-close">close ✕</span>
    <span id="lb-prev">← prev</span>
    <img id="lb-img" src="" alt="" />
    <span id="lb-next">next →</span>
  </div>

  <header>
    <a href="index.html" class="logo-wrap">
      <img src="assets/logo.gif" alt="jessi clover belgrave">
    </a>
    <nav>
      <a href="index.html#motion">motion</a>
      <a href="index.html#stills">stills</a>
      <a href="index.html#info">info</a>
    </nav>
  </header>

  <div class="page-inner">
    <h1>gather x soho house – cinema ad</h1>

    <div class="photo-grid">
      <img src="images/gather/01.jpg" loading="lazy" alt="gather x soho house">
      <img src="images/gather/02.jpg" loading="lazy" alt="gather x soho house">
      <img src="images/gather/03.jpg" loading="lazy" alt="gather x soho house">
      <img src="images/gather/04.jpg" loading="lazy" alt="gather x soho house">
      <img src="images/gather/05.jpg" loading="lazy" alt="gather x soho house">
      <img src="images/gather/06.jpg" loading="lazy" alt="gather x soho house">
      <img src="images/gather/07.jpg" loading="lazy" alt="gather x soho house">
    </div>
  </div>

  <footer>© jessi clover belgrave. 2026. all rights reserved.</footer>

  <script>
    const imgs = document.querySelectorAll('.photo-grid img');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    let current = 0;
    function lbOpen(i) { current = i; lbImg.src = imgs[i].src; lb.classList.add('open'); }
    imgs.forEach((img, i) => img.addEventListener('click', () => lbOpen(i)));
    document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
    document.getElementById('lb-prev').addEventListener('click', () => lbOpen((current - 1 + imgs.length) % imgs.length));
    document.getElementById('lb-next').addEventListener('click', () => lbOpen((current + 1) % imgs.length));
    lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') lb.classList.remove('open');
      if (e.key === 'ArrowLeft') lbOpen((current - 1 + imgs.length) % imgs.length);
      if (e.key === 'ArrowRight') lbOpen((current + 1) % imgs.length);
    });
  </script>
</body>
</html>
