<!DOCTYPE html>

  <title>the diamond store – jessi clover belgrave</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eabcbc;
      color: #2d6b5b;
      font-family: 'VT323', monospace;
      text-transform: lowercase;
      cursor: url('assets/cursor.png') 24 8, pointer;
      min-height: 100vh;
    }
    a { color: #2d6b5b; text-decoration: none; }
    a:hover { opacity: 0.6; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.8rem 2rem 0;
    }
    .logo-wrap img { height: 70px; display: block; }
    nav { display: flex; gap: 2.5rem; font-size: 1.5rem; }

    .page-inner {
      padding: 2rem 2rem 5rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: normal;
      margin-bottom: 2rem;
      opacity: 0.75;
    }

    .instagram-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      align-items: start;
    }
    .instagram-wrap {
      display: flex;
      justify-content: center;
    }
    .instagram-media {
      min-width: 0 !important;
      width: 100% !important;
    }

    footer { text-align: center; padding: 2rem; font-size: 0.9rem; opacity: 0.5; }

    @media (max-width: 768px) { .instagram-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .instagram-grid { grid-template-columns: 1fr; } }
  </style>
</head>
