<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bea & her business – jessi clover belgrave</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eabcbc;
      color: #2d6b5b;
      font-family: 'VT323', monospace;
      text-transform: lowercase;
      cursor: url('assets/cursor.png') 24 8, pointer;
      min-height: 100vh;
    }
    a { color: #2d6b5b; text-decoration: none; }
    a:hover { opacity: 0.6; }

    /* ── NAV ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.8rem 2rem 0;
    }
    .logo-wrap img {
      height: 70px;
      display: block;
    }
    nav {
      display: flex;
      gap: 2.5rem;
      font-size: 1.5rem;
    }

    /* ── PAGE ── */
    .page-inner {
      padding: 2rem 2rem 5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: normal;
      margin-bottom: 2rem;
      opacity: 0.75;
    }

    /* ── PHOTO GRID ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 2.4rem;
    }
    .photo-grid img {
      width: 100%; height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s ease;
      cursor: url('assets/cursor.png') 24 8, pointer;
    }
    .photo-grid img:hover { transform: scale(1.02); opacity: 0.85; }

    /* ── VIDEO ROW ── */
    .video-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.8rem;
      margin-bottom: 2.4rem;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      border: none;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(234,188,188,0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 88vw; max-height: 88vh; object-fit: contain; display: block; }
    #lb-close {
      position: fixed; top: 28px; right: 36px;
      font-size: 1.4rem; color: #2d6b5b; opacity: 0.7;
      cursor: url('assets/cursor.png') 24 8, pointer;
    }
    #lb-close:hover { opacity: 1; }
    #lb-prev, #lb-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      font-size: 1.4rem; color: #2d6b5b; opacity: 0.5;
      cursor: url('assets/cursor.png') 24 8, pointer;
      user-select: none;
    }
    #lb-prev { left: 36px; } #lb-next { right: 36px; }
    #lb-prev:hover, #lb-next:hover { opacity: 1; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .video-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="lightbox">
    <span id="lb-close">close ✕</span>
    <span id="lb-prev">← prev</span>
    <img id="lb-img" src="" alt="" />
    <span id="lb-next">next →</span>
  </div>

  <header>
    <a href="index.html" class="logo-wrap">
      <img src="assets/logo.gif" alt="jessi clover belgrave">
    </a>
    <nav>
      <a href="index.html#motion">motion</a>
      <a href="index.html#stills">stills</a>
      <a href="index.html#info">info</a>
    </nav>
  </header>

  <div class="page-inner">
    <h1>bea & her business – ep visuals</h1>

    <div class="photo-grid">
      <img src="images/bea/bea-1.jpg" loading="lazy" alt="bea & her business">
      <img src="images/bea/bea-2.jpg" loading="lazy" alt="bea & her business">
      <img src="images/bea/bea-3.jpg" loading="lazy" alt="bea & her business">
      <img src="images/bea/bea-4.jpg" loading="lazy" alt="bea & her business">
      <img src="images/bea/bea-5.jpg" loading="lazy" alt="bea & her business">
      <img src="images/bea/bea-6.jpg" loading="lazy" alt="bea & her business">
    </div>

    <div class="video-row">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/PcDCR8s0IU4?rel=0&color=white"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
      </div>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/6-B2hDMR7S0?rel=0&color=white"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
      </div>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/dM7CmIHwJnU?rel=0&color=white"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
      </div>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/R0UJgMJJaio?rel=0&color=white"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
      </div>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/bvXV4pfIzog?rel=0&color=white"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <footer>© jessi clover belgrave. 2026. all rights reserved.</footer>

  <script>
    const imgs = document.querySelectorAll('.photo-grid img');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    let current = 0;

    function lbOpen(i) {
      current = i;
      lbImg.src = imgs[i].src;
      lb.classList.add('open');
    }
    imgs.forEach((img, i) => img.addEventListener('click', () => lbOpen(i)));
    document.getElementById('lb-close').addEventListener('click', () => lb.classList.remove('open'));
    document.getElementById('lb-prev').addEventListener('click', () => lbOpen((current - 1 + imgs.length) % imgs.length));
    document.getElementById('lb-next').addEventListener('click', () => lbOpen((current + 1) % imgs.length));
    lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') lb.classList.remove('open');
      if (e.key === 'ArrowLeft') lbOpen((current - 1 + imgs.length) % imgs.length);
      if (e.key === 'ArrowRight') lbOpen((current + 1) % imgs.length);
    });
  </script>
</body>
</html>
